

<!DOCTYPE html>
    <html>
        <head></head>
        <style>
            fieldset{border-color: blue;border-radius: 4px;}
            legend{color: blue;}
            input:hover{background-color:grey;cursor: pointer;}
            /* #file{} */
         
        </style>
        <form>
        <body style="background-color:skyblue;">
            <h1 style="color:blue; font-family: Arial, sans-serif; text-align: center;">Registration From</h1>
            <table>
                <thead></thead>
                <tbody>
                    <tr>
                        <td>
                            <fieldset>
                            <legend>General Information</legend>
                            <table>
                                <tbody>
                                    <tr>
                                        <td>
                                            <label for="fname">First Name</label>
                                        </td>
                                        <td>
                                            <label for="fname">:</label>
                                        </td>
                                        <td>
                                            <input type="text" id="fname" name="fname">
                                        </td>
                                    </tr>
                                    <tr>
                                        <td>
                                            <label for="lname">Last Name</label>
                                        </td>
                                        <td>
                                            <label for="lname">:</label>
                                        </td>
                                        <td>
                                            <input type="text" id="lname" name="lname">
                                        </td>
                                    </tr>
                                    <tr>
                                        <td>
                                            <label for="gender">Gender</label>
                                        </td>
                                        <td>
                                            <label for="gender">:</label>
                                        </td>
                                        <td>
                                            <input type="radio" id="male" name="gender" value="Male">Male
                                        </td>
                                        <td>
                                            <input type="radio" id="female" name="gender" value="Female">Female
                                        </td>
                                    </tr>
                                    <tr>
                                        <td>
                                            <label for="faname">Father's Name</label>
                                        </td>
                                        <td>
                                            <label for="faname">:</label>
                                        </td>
                                        <td>
                                            <input type="text" id="faname" name="faname">
                                        </td>
                                        <td><fieldset style="border: 0.5px solid black;"><input type="file" id="file" name="file"></fieldset>
                                        </td>
                                    </tr>
                                    <tr>
                                        <td>
                                            <label for="mname">Mother's Name</label>
                                        </td>
                                        <td>
                                            <label for="mname">:</label>
                                        </td>
                                        <td>
                                            <input type="text" id="mname" name="mname">
                                        </td>
                                    </tr>
                                    <tr>
                                        <td>
                                            <label for="blood">Blood Group</label>
                                        </td>
                                        <td>
                                            <label for="blood">:</label>
                                        </td>
                                        <td>
                                            <select id="blood" name="blood">
                                                <option value="A+">A+</option>
                                                <option value="B+">B+</option>
                                                <option value="A-">A-</option>
                                                <option value="B-">B-</option>
                                            </select>
                                        </td>
                                    </tr>
                                    <tr>
                                        <td>
                                            <label for="religion">Select your relegion</label>
                                        </td>
                                        <td>
                                            <label for="religion">:</label>
                                        </td>
                                        <td>
                                            <select id="religion" name="religion">
                                                <option value="Islam">Islam</option>
                                                <option value="Hinduism">Hinduism</option>
                                                <option value="Christian">Christian</option>
                                            </select>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </fieldset>
                        </td>
                        <td>
                            <fieldset>
                                <legend>Contact Information</legend>
                                <table>
                                    <tbody>
                                        <tr>
                                            <td>
                                                <label for="email">Email</label>
                                            </td>
                                            <td>
                                                <label for="email">:</label>
                                            </td>
                                            <td>
                                                <input type="text" id="email" name="email">
                                            </td>
                                        </tr>
                                        <tr>
                                            <td>
                                                <label for="phn">Phone/Mobile</label>
                                            </td>
                                            <td>
                                                <label for="phn">:</label>
                                            </td>
                                            <td>
                                                <input type="text" id="phn" name="phn">
                                            </td>
                                        </tr>
                                        <tr>
                                            <td>
                                                <label for="website">Website</label>
                                            </td>
                                            <td>
                                                <label for="website">:</label>
                                            </td>
                                            <td>
                                                <input type="text" id="website" name="website">
                                            </td>
                                        </tr>
                                        <tr>
                                            <td><label>Address</label></td>
                                            <td><label>:</label></td>
                                            <td>
                                                <fieldset>
                                                <legend>Present Address</legend>
                                                <select id="country" name="country">
                                                    <option value="Bangladesh">Bangladesh</option>
                                                    <option value="India">India</option>
                                                </select>
                                                <select id="city" name="city">
                                                    <option value="Dhaka">Dhaka</option>
                                                    <option value="Ctg">Ctg</option>
                                                </select>
                                                <br><br>
                                                <textarea id="txt" name="txt" placeholder="Road/City/Street"></textarea>
                                                <br><br>
                                                <input type="text" id="post" name="post" placeholder="Post Code">
                                            </fieldset>
                                            </td>
                                        </tr>
                                    </tbody>
                                </table>
                            </fieldset>
                        </td>
                        <td>
                            <fieldset style="background-image:url(imageszee.jpg);">
                                <legend>Account Information</legend>
                                <table>
                                    <tbody>
                                        <tr>
                                            <td>
                                                <label for="username">Username</label>
                                            </td>
                                            <td>
                                                <label for="username">:</label>
                                            </td>
                                            <td>
                                                <input type="text" id="username" name="username">
                                            </td>
                                        </tr>
                                        <tr>
                                            <td>
                                                <label for="password">Password</label>
                                            </td>
                                            <td>
                                                <label for="password">:</label>
                                            </td>
                                            <td>
                                                <input type="password" id="password" name="password">
                                            </td>
                                        </tr>
                                        <tr>
                                            <td>
                                                <label for="confpassword">Confirm Password</label>
                                            </td>
                                            <td>
                                                <label for="confpassword">:</label>
                                            </td>
                                            <td>
                                                <input type="password" id="confpassword" name="confpassword">
                                            </td>
                                        </tr>
                                    </tbody>
                                </table>
                            </fieldset>
                            <br>
                            <input type="submit" value="Register" style="background-color: blue; color: white; border: 0.5px black;border-radius: 2px; padding: 6px;">
                        </td>
                    </tr>
                </tbody>
            </table>
        </form>
        </body>
    </html>
